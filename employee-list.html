
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bajaj Auto - Employee List</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    background:#f1f5f9;
    font-family:Arial,sans-serif;
}

.card{
    border-radius:24px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-3px);
}

</style>

</head>

<body>

<div class="max-w-7xl mx-auto p-3 md:p-8">

    <!-- HEADER -->

    <div class="bg-white shadow rounded-3xl p-6 flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-6">

        <div>

            <h1 class="text-3xl md:text-4xl font-bold text-blue-700">

                BAJAJ AUTO

            </h1>

            <p class="text-gray-500 mt-2">

                Employee Bus Pass Management

            </p>

        </div>

        <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">

            <a href="admin-dashboard.html"
               class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl text-center">

                ← Dashboard

            </a>

            <button
                onclick="location.reload()"
                class="bg-green-600 hover:bg-green-700 text-white px-5 py-3 rounded-xl">

                Refresh

            </button>

        </div>

    </div>

    <!-- SUMMARY CARDS -->

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 mb-6">

        <div class="bg-white shadow card p-6">

            <p class="text-gray-500">

                Total Employees

            </p>

            <h2 id="totalEmployees"
                class="text-3xl md:text-5xl font-bold text-blue-600 mt-3">

                0

            </h2>

        </div>

        <div class="bg-white shadow card p-6">

            <p class="text-gray-500">

                Approved Passes

            </p>

            <h2 id="approvedEmployees"
                class="text-3xl md:text-5xl font-bold text-green-600 mt-3">

                0

            </h2>

        </div>

        <div class="bg-white shadow card p-6">

            <p class="text-gray-500">

                Pending Passes

            </p>

            <h2 id="pendingEmployees"
                class="text-3xl md:text-5xl font-bold text-orange-500 mt-3">

                0

            </h2>

        </div>

    </div>

    <!-- SEARCH -->

    <div class="bg-white rounded-3xl shadow p-5 mb-6">

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

            <input
                type="text"
                id="searchEmployee"
                placeholder="🔍 Search Employee Name or Code"
                class="border rounded-xl p-3 w-full">

            <select
                id="departmentFilter"
                class="border rounded-xl p-3">

                <option value="">All Departments</option>

                <option>Production</option>
                <option>Quality</option>
                <option>Maintenance</option>
                <option>HR</option>
                <option>IT</option>

            </select>

            <select
                id="statusFilter"
                class="border rounded-xl p-3">

                <option value="">All Status</option>

                <option>Approved</option>

                <option>Pending</option>

            </select>

        </div>

    </div>


<tr class="border-b hover:bg-slate-50 transition">

    <td class="p-4">
        ${row[0]}
    </td>

    <td class="p-4 font-semibold text-slate-800">
        ${row[1]}
    </td>

    <td class="p-4">
        ${row[2]}
    </td>

    <td class="p-4">
        ${row[3]}
    </td>

    <td class="p-4">
        ${row[6]}
    </td>

    <td class="p-4">

        ${
            status === "Approved"

            ?

            `<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm font-semibold">
                ✅ Approved
            </span>`

            :

            `<span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-sm font-semibold">
                ⏳ Pending
            </span>`
        }

    </td>

    <td class="p-4 text-center">
        
            <a href="http://127.0.0.1:5000/generate-pass/${row[0]}"
                target="_blank"
                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl inline-block">

                🎫 View Pass

            </a>`

            :

            `<span class="text-gray-400 font-medium">

                Bus Pass Not Generated

            </span>        }

    </td>

</tr>

`;
