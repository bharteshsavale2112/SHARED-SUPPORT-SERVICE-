<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
  font-family:'Inter',sans-serif;
  background:
  linear-gradient(rgba(15,23,42,.88),rgba(15,23,42,.88)),
  url('download\ \(1\).png');
  background-size:cover;
  background-position:center;
}

.login-box{
  backdrop-filter:blur(12px);
}

.btn{
  transition:.2s;
}

.btn:hover{
  transform:scale(.98);
}


.back-btn{
    position: fixed;
    top: 20px;
    right: 20px;
    background: #007bff;
    color: white;
    text-decoration: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    transition: 0.3s;
    z-index: 1000;
}

.back-btn:hover{
    background: #0056b3;
}

</style>

</head>

<body class="min-h-screen flex items-center justify-center p-4">

<!-- BACK BUTTON -->

<a href="home.html" class="back-btn">
← Back Home
</a>

<!-- LOGIN BOX -->

<div class="login-box bg-white/10 border border-white/20 w-full max-w-md rounded-3xl p-8 shadow-2xl">

<!-- LOGO -->

<div class="text-center mb-8">

<div class="h-20 w-20 rounded-3xl bg-blue-600 mx-auto flex items-center justify-center text-white text-4xl shadow-xl">
🛡️
</div>

<h1 class="text-3xl font-extrabold text-white mt-5">
ADMIN LOGIN
</h1>

<p class="text-slate-300 text-sm mt-2">
Bajaj Auto Transport Management
</p>

</div>

<!-- FORM -->

<form
action="http://127.0.0.1:5000/admin-login"
method="POST"
class="space-y-5">

<!-- EMAIL -->

<div>

<label class="text-white text-sm font-semibold block mb-2">
Admin Email
</label>

<input
type="email"
name="email"
placeholder="Enter Admin Email"
required
class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 text-white placeholder-slate-300 outline-none focus:border-blue-400">

</div>

<!-- PASSWORD -->

<div>

<label class="text-white text-sm font-semibold block mb-2">
Password
</label>

<input
type="password"
name="password"
placeholder="Enter Password"
required
class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 text-white placeholder-slate-300 outline-none focus:border-blue-400">

</div>

<!-- LOGIN BUTTON -->

<button
type="submit"
class="btn w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-bold text-lg">

Admin Login

</button>

</form>

<!-- FORGOT PASSWORD -->

<div class="mt-6 text-center">

<a href="admin-forgot-password.html"
class="text-slate-300 text-sm hover:text-white">

Forgot Password?

</a>

</div>

<!-- FOOTER -->

<div class="border-t border-white/10 mt-8 pt-5 text-center">

<p class="text-slate-400 text-xs">
© 2026 Bajaj Auto Transport System
</p>

</div>

</div>

</body>
</html>
