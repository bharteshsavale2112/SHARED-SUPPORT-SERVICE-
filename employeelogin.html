<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employee Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
  font-family:'Inter',sans-serif;
  background:
  linear-gradient(rgba(15,23,42,.85),rgba(15,23,42,.85)),
  url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600&auto=format&fit=crop');

  background-size:cover;
  background-position:center;
}

.login-box{
  backdrop-filter:blur(10px);
}

</style>

</head>

<<body class="min-h-screen flex items-center justify-center p-4 relative">

<!-- BACK BUTTON -->

<div class="absolute top-5 right-5">

<a href="home.html"
class="bg-white/10 border border-white/20 text-white px-4 py-2 rounded-xl font-semibold hover:bg-white/20 transition">

← Back

</a>

</div>

<!-- LOGIN CARD -->

<div class="login-box bg-white/10 border border-white/20 w-full max-w-md rounded-3xl p-8 shadow-2xl">

<!-- LOGO -->

<div class="text-center mb-8">

<div class="h-20 w-20 rounded-3xl bg-blue-600 mx-auto flex items-center justify-center text-white text-4xl shadow-xl">
🚌
</div>

<h1 class="text-3xl font-extrabold text-white mt-5">
BAJAJ AUTO
</h1>

<p class="text-slate-300 text-sm mt-2">
EMPLOYEE TRANSPORT LOGIN
</p>

</div>

<!-- FORM -->

<form class="space-y-5">

<div>

<label class="text-white text-sm font-semibold block mb-2">
Employee ID
</label>

<input
type="text"
placeholder="Enter Employee ID"
class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 text-white placeholder-slate-300 outline-none focus:border-blue-400">

</div>

<div>

<label class="text-white text-sm font-semibold block mb-2">
Password
</label>

<input
type="password"
placeholder="Enter Password"
class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 text-white placeholder-slate-300 outline-none focus:border-blue-400">

</div>

<div>

<label class="text-white text-sm font-semibold block mb-2">
Select Shift
</label>

<select
class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 text-white outline-none focus:border-blue-400">

<option class="text-black">1st Shift</option>
<option class="text-black">2nd Shift</option>
<option class="text-black">3rd Shift</option>
<option class="text-black">OT Shift</option>

</select>

</div>

<button
type="submit"
class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-bold text-lg transition">

Login

</button>

</form>

<!-- EMPLOYEE REGISTRATION -->

<div class="mt-4">

<a href="employeeregistration.html"
class="block text-center w-full bg-green-600 hover:bg-green-700 text-white p-4 rounded-2xl font-bold transition">

New Employee Registration

</a>

</div>

<!-- FORGOT PASSWORD -->

<div class="mt-6 text-center">

<a href="forgot.html"
class="text-slate-300 text-sm hover:text-white">

Forgot Password?

</a>

</div>

<!-- FOOTER -->

<div class="border-t border-white/10 mt-8 pt-5 text-center">

<p class="text-slate-400 text-xs">
© 2026 Bajaj Auto Transport System
</p>

</div>

</div>

</body>
</html>
